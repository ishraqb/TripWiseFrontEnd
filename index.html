<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TripWise</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <h1>TripWise</h1>
    <p>Plan your trip and get three plans: Cheapest, Balanced, and Experience-Focused.</p>
  </header>

  <main class="main">
    <form id="trip-form" class="form">
      <div class="field">
        <label for="origin">Departure airport</label>
        <input type="text" id="origin" placeholder="JFK">
      </div>

      <div class="field">
        <label for="destination">Destination</label>
        <input type="text" id="destination" placeholder="London">
      </div>

      <div class="field">
        <label for="start-date">Departure date</label>
        <input type="date" id="start-date">
      </div>

      <div class="field">
        <label for="end-date">Return date</label>
        <input type="date" id="end-date">
      </div>

      <div class="field">
        <label for="budget">Total budget (USD)</label>
        <input type="number" id="budget" placeholder="3000" min="1">
      </div>

      <div class="field">
        <label for="travelers">Travelers</label>
        <input type="number" id="travelers" placeholder="1" min="1" value="1">
      </div>

      <div class="field">
        <label for="style">Travel style</label>
        <input type="text" id="style" placeholder="foodie, adventure, relaxed">
      </div>

      <div class="field">
        <label for="interests">Interests</label>
        <input type="text" id="interests" placeholder="food, culture, art">
      </div>

      <button type="submit" class="button">Build my 3 plans</button>
    </form>

    <p id="error" class="error"></p>

    <section id="results" class="results"></section>
  </main>

  <footer class="footer">
    <p>TripWise</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
